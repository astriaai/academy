name: Set up build environment
description: >
  Node + npm deps + ffmpeg + system Chrome for the webinar-builder pipeline.
  Assumes the repo is already checked out.

runs:
  using: composite
  steps:
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version-file: .nvmrc
        cache: npm
        cache-dependency-path: webinar-builder/package-lock.json

    - name: Install npm dependencies
      shell: bash
      working-directory: webinar-builder
      env:
        PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      run: |
        set -euxo pipefail
        timeout 15m npm ci --prefer-offline --no-audit --fund=false

    - name: Install ffmpeg
      shell: bash
      run: |
        set -euxo pipefail
        if command -v ffmpeg >/dev/null 2>&1; then
          ffmpeg -version | head -1
        else
          sudo apt-get update
          timeout 10m sudo apt-get install -y --no-install-recommends ffmpeg
        fi

    - name: Use system Chrome for HyperFrames
      shell: bash
      run: |
        set -euxo pipefail
        chrome_path="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
        if [[ -z "$chrome_path" ]]; then
          sudo apt-get update
          timeout 10m sudo apt-get install -y --no-install-recommends google-chrome-stable
          chrome_path="$(command -v google-chrome || command -v google-chrome-stable || true)"
        fi
        if [[ -z "$chrome_path" ]]; then
          echo "::error::No system Chrome found for HyperFrames rendering"
          exit 1
        fi
        echo "HYPERFRAMES_BROWSER_PATH=$chrome_path" >> "$GITHUB_ENV"
        "$chrome_path" --version

    - name: Verify hyperframes renderer
      shell: bash
      working-directory: webinar-builder
      run: |
        set -euxo pipefail
        timeout 5m npx hyperframes@0.4.9 doctor || true
