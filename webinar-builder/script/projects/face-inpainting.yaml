# Project manifest — Astria Face Inpainting feature tutorial.
# Standalone module under the bi-weekly cadence. The whole video lives inside
# the Astria prompts UI: enable the "Inpaint faces" toggle on a generation and
# compare the two output versions ("1 Final" with face inpaint applied vs
# "2 Inpaint Woman/Man Original" — the first face render).
#
# Editorial portrait/beauty register — close-up faces, atelier vocabulary.

meta:
  title: "Face Inpainting"
  tags:
    - face-inpainting
  presenter: "Astria"
  resolution: "1920x1080"
  fps: 30

defaults:
  tts:
    provider: "gemini"
    voice: "Aoede"
    model: "gemini-3.1-flash-tts-preview"

  music:
    # Same bed as 3d-packshots — "Acid Jazz Groove" by alex-morgan, Pixabay
    # CC0 (no attribution required):
    # https://pixabay.com/music/cafe-acid-jazz-groove-517096/
    # The portrait/beauty register sits well over the same smooth funk pad.
    src: "assets/music/acid-jazz-groove.mp3"
    volume: 0.16
    # Mix the bed in once at the stitch stage with sidechain ducking against
    # the narration; keeps it continuous across segment boundaries and pulls
    # it ~8 dB under whenever Yuli speaks. See pipeline/stitch.ts.
    mix_at_stitch: true

  # Presenter — Yuli, the course's recurring presenter. One face for the
  # whole series. Keep her alive in the frame: small pointing motions,
  # beauty-review energy, and natural emphasis timed to the face details.
  avatar:
    image_url: "assets/avatars/yuli.jpg"
    engine: "infinitetalk"
    resolution: "720p"
    video_prompt: >-
      Engaged studio presenter with natural micro-expressions, small hand
      gestures, light pointing motions toward the examples, direct eye contact,
      warm beauty-review energy, subtle upper-body motion, calm confidence.

segments:
  - 00-intro              # TV-show open with Yuli presenter + face-detail panels (~10s)
  - 02-before-after       # Face inpainting examples: first render vs final face pass (~41s)
  - 01-overview           # Why it matters after the examples, before workflow (~24s)
  - 02-workflow           # UI recording: loaded page → 4K → toggle → compare Original/Final (~45s)
  - 03-faqs               # FAQ slide — second Nano Banana pass, time/cost, 4K (~35s)
