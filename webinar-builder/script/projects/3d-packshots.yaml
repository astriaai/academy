# Project manifest — Astria 3D Packshots feature tutorial.
# Standalone tutorial under the bi-weekly cadence. Editorial product-studio
# aesthetic; distinct presenter look from the VST project.

meta:
  title: "Astria · 3D Packshots"
  presenter: "Astria"
  resolution: "1920x1080"
  fps: 30

defaults:
  tts:
    provider: "gemini"
    voice: "Aoede"
    model: "gemini-3.1-flash-tts-preview"

  music:
    # "Acid Jazz Groove" by alex-morgan, Pixabay CC0 (no attribution required):
    # https://pixabay.com/music/cafe-acid-jazz-groove-517096/
    # Smooth acid-jazz/funk bed, ~3 min, sits well behind a silent narration track
    # and leaves headroom for a future TTS pass (volume bumps to the SFX dings).
    src: "assets/music/acid-jazz-groove.mp3"
    volume: 0.55

  # Rotation MP4s pulled from astria.ai workspace ws=503 (Fashion 3d-packshots).
  # Used as b-roll behind the FAQ slide + the showcase background layer.
  background_videos:
    - "assets/results/3d-packshots/rotation-backpack-blue.mp4"
    - "assets/results/3d-packshots/rotation-bag-burgundy.mp4"
    - "assets/results/3d-packshots/rotation-sneaker-single.mp4"
    - "assets/results/3d-packshots/rotation-sneakers-pair.mp4"

  # Presenter — Yuli, the course's recurring presenter. The whole series uses
  # ONE presenter; never invent a new face per module. Her source headshot is
  # committed in-repo at assets/avatars/yuli.jpg — build.ts inlines it as a
  # base64 data URI for the lipsync API, so there is no dependency on an
  # external image host. Lipsynced via WaveSpeed InfiniteTalk at 720p.
  avatar:
    image_url: "assets/avatars/yuli.jpg"
    engine: "infinitetalk"
    resolution: "720p"
    video_prompt: >-
      Subtle natural micro-expressions and very small head movements, calm
      steady pose, looking directly at the camera with quiet confidence, no
      hand gestures, minimal upper-body motion.

segments:
  - 00-intro              # TV-show open with editorial Seedance + serif title (~10s)
  - 01-showcase           # One reference still in → 360° + stills out (~14s)
  - 02-workflow           # Playwright screencast of /p/backpack upload flow (~40s)
  - 02-before-after       # Ugly iPhone reference vs clean rotating packshot (~18s)
  - 03-why-it-matters     # Conversion math — +134% PDP, +27% spin, +35% ATC, −12–18% returns (~36s)
  - 04-faqs               # FAQ slide — what counts as a good source, cost, formats (~30s)
