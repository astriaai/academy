narration: |
  So, what do I mean when I say "AI photoshoot"?
  I mean everything that would normally be involved in the logistics of a traditional shoot —
  coordinating models, locations, shipping inventory, making sure product arrives from production to the shoot day.
  Stylists, makeup, hair — all of that logistics exists, ultimately, to serve the brand's DNA.
  The entire photoshoot is there to convey the brand's identity,
  and we need to somehow implement and communicate that — now, with AI.

