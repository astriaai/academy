narration: |
  Let's start by opening a new workspace. Click on the Workspace dropdown next to the logo at the top. Click "New workspace". 
  
  Now that we have a clear workspace, let's think about the brand's identity: 
  1. How does its lookbook look like? Is it white studio soft-box, white-background or gray? Does the background has a concrete floor or maybe it's an outdoor shoot? 
  2. How do the models look like? Age group, target demographics, are their faces serious, casual or family oriented happy faces? Is their hair pulled back in a hair-bun or flowing wavy hair? 
  3. Poses -  Do we need only strict front, back, 45 side and detail view with hands next to the body ? Or maybe the brand wants some more dynamic poses with movement or different poses?
  
  
  
  Let's click the "Lookbook" button and start adding references.
  Let's go one by one:
  Pose - let's select a front full body pose.
  Face - we can select a face from the public library or upload our own.
  Top - let's select a simple white shirt.
  Bottom - I'll select the jeans here.
  Footwear - let's select these pair of pants.
  
  Now for few technicalities:
  For now - make sure model "Nano Banana 2" is selected.
  Resolution: 2K - for iterating quickly. Once you're happy with the lookbook, consider switching to 4K.
  Aspect ratio 3:4 - most lookbooks are 3:4.
  For quicker iteration, let's do 2 images per prompt. Later consider 4 in case you'd like to provide more variation.

