narration: |
  The industry shift we see is from one-off AI images to a reusable
  artifact. We train a brand's identity into a model once, then we build
  templates — recipes the brand or creative can run themselves. That way
  a single template produces the next fifty lookbooks. The creative stays
  in the loop; the volume scales.

