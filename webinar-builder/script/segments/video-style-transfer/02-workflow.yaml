# Marker highlights — luxe-gold strokes around the UI element each bullet
# refers to. Coordinates are in Playwright source-pixel space (1600×900).
# Astria's mode-switcher buttons sit upper-left of the prompt panel; the
# file-upload trigger is the small button-row beside the prompt box; the
# model dropdown is in the parameter rail below the prompt. These coords
# are eyeball estimates — refine against the actual capture if needed.
markers:
  # Bullet 1 (t=3) → Image-mode pill (top of prompt panel)
  - { start: 3.0,  duration: 4.0,  shape: circle,   cx: 260,  cy: 145, r: 70,  style: luxe-gold }
  # Bullet 2 (t=14) → Video-mode pill (sibling of Image, slightly right)
  - { start: 14.0, duration: 4.0,  shape: circle,   cx: 380,  cy: 145, r: 70,  style: luxe-gold }
  # Bullet 2 cont. → driving-video upload button (file-input trigger row)
  - { start: 18.5, duration: 4.0,  shape: underline, cx: 360, cy: 470, w: 280, style: luxe-gold }
  # Bullet 3 (t=26) → video prompt textarea (centered)
  - { start: 26.0, duration: 6.0,  shape: underline, cx: 800, cy: 720, w: 700, style: luxe-cream }
  # Bullet 4 (t=38) → Seedance model select in the param rail
  - { start: 38.0, duration: 6.0,  shape: circle,   cx: 1290, cy: 250, r: 130, style: luxe-gold }

narration: |
  Here's the four-step flow.

  First — write a minimal image prompt in the image tab. Subject,
  framing, nothing more. Astria handles the rest.

  Next — pick the driving video. This is the motion source. We'll
  use a 360 turnaround so the model rotates naturally.

  Third — write a minimal video prompt describing the action. In our
  case: she is turning around 360, professional lookbook, plain
  white background, looking at the camera, natural relaxed pose,
  micro-expressions, with shot cuts every two seconds.

  Finally — select Seedance 2 fast, at 720p or 480p. That's it.
  Hit generate and you'll get the result clips you saw at the start.
