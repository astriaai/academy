caption:
  eyebrow: "LOOKBOOK · DEMO"
  html: |
    Right-click any reference to
    <span class="accent">edit it in place</span>.

narration: |
  Let me open a Lookbook I've been working on.
  Each slot here holds a reference — pose, face, jacket, shirt, footwear, background.
  The powerful part is that you don't need to re-upload anything if a reference isn't quite right.
  Right-click on any thumbnail and you get options to crop it,
  remove the background, or edit it in place with Nano Banana.
  Here I'll remove the background from the jacket —
  and the reference updates in the grid without me touching the upload flow again.

