id: 02-before-after
title: "Before / after — phone snap vs clean packshot"
order: 2
visual: video-showcase

# The teaching beat: a deliberately ugly iPhone reference (generated by
# NanoBanana from the clean product photo) side-by-side with the finished
# 360° rotation. Same product, same colors, totally different production
# value. Makes the value prop visible without saying it.
showcase:
  videos:
    - src: "assets/results/3d-packshots/ref-bag-burgundy-ugly.jpg"
      label: "RAW iPHONE PHOTO"
    - src: "assets/results/3d-packshots/rotation-bag-burgundy.mp4"
      label: "CLEAN AI PACKSHOT"

caption:
  eyebrow: "BEFORE / AFTER"
  html: |
    Bad lighting, messy kitchen, harsh flash.
    Astria still pulls a
    <span class="accent">clean packshot</span>.

narration: |
  You don't need a studio. This burgundy bag on the left was shot on a
  cluttered kitchen table at midnight, harsh phone flash, coffee ring
  on the wood — basically the worst possible reference. Astria takes
  that single ugly snapshot and turns it into the clean studio rotation
  on the right. Same bag, same color, same hardware — production
  quality without the production.

