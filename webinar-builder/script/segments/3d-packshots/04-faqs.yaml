id: 04-faqs
title: "FAQs"
order: 4
visual: presenter-slide

slide:
  eyebrow: "FAQ"
  title_html: |
    Three things to
    <span class="accent">know</span>.
  bullets:
    - "Reference image. Any clean product shot works. Studio is ideal, but a clear phone photo can work too."
    - "Format and finish. Studio-quality 3:4 visuals, ready for PDPs, lookbooks, and Reels."
    - "Production efficiency. Much more affordable than a traditional product shoot, so you can test backdrops, angles, and styling options before locking the final visuals."
  bullet_starts: [3.0, 12.0, 22.0]

narration: |
  Three things to know.

  Reference image. Any clean product shot works. A studio capture is
  ideal, but a clear phone photo can work too. The cleaner the source,
  the more faithful the rotation.

  Format and finish. Studio-quality three-by-four visuals, ready for
  PDPs, lookbooks, and Reels.

  Production efficiency. Much more affordable than a traditional
  product shoot, so you can test backdrops, angles, and styling
  options before locking the final visuals.

