id: 04-faqs
title: "FAQs"
order: 4
visual: presenter-slide

slide:
  eyebrow: "FAQ"
  title_html: |
    Three things to
    <span class="accent">know</span>.
  bullets:
    - "What works as a reference — any clean shot of the product. Polished studio capture is ideal; even a phone snap on the cutting table will fly. The cleaner the source, the more faithful the rotation."
    - "Format & finish — portrait 3:4 at studio quality, looped to drop straight into the PDP, the lookbook, or the Reels grid. Matches a fashion grid out of the box."
    - "Per-product cost — pennies per rotation. Cheap enough to A/B test two backdrops or a half-step in the angle before locking the listing shot."
  bullet_starts: [3.0, 14.0, 26.0]

narration: |
  Three things worth knowing.

  Reference photo — anything goes, within reason. A clean studio
  capture is the easy path. A phone snap from the cutting table
  still works. Astria does the heavy lifting. The cleaner the
  source, the more faithful the rotation.

  Format — portrait three-by-four at studio quality, loops
  seamlessly. Drop it straight into a product page, a lookbook
  reel, or a Pinterest carousel. It already matches a fashion grid.

  Cost — pennies per rotation. Cheap enough to iterate. Try a
  champagne backdrop. Try a half-step in the angle. Land on the
  hero shot before you commit.

