id: 03-why-it-matters
title: "Why it matters — the conversion math"
order: 3
visual: presenter-slide

# Scene 3 of the new arc: the business case in real numbers.
# All four stats are from publicly reported case studies / industry
# research — no invented figures. Sources logged in the segment notes
# at the bottom. Bullets are paced to the narration with bullet_starts
# so the numbers land on the beats.
slide:
  eyebrow: "WHY IT MATTERS"
  title_html: |
    Better visuals.
    <span class="accent">Better business.</span>
  bullets:
    - "Better product visuals help shoppers understand the product faster, trust what they see, and feel more confident buying online."
    - "360° product views have been linked to higher conversions, stronger engagement, and fewer returns in ecommerce case studies."
    - "Practical Ecommerce reports that 360° product photography has been associated with sales lifts ranging from 5% to 40%, with one cited study suggesting a 14% increase in sales and a 17% better shopping experience."
    - "In another example, True Value reportedly saw a 22% conversion lift after adding 360° product photography, while Home Depot saw fewer returns during a 360° product-photo A/B test."
  bullet_starts: [2.5, 13.0, 23.0, 38.0]

narration: |
  So why does this matter?

  Better product visuals help shoppers understand the product faster,
  trust what they see, and feel more confident buying online.

  360-degree product views have been linked to higher conversions,
  stronger engagement, and fewer returns across ecommerce case
  studies.

  Practical Ecommerce reports that 360-degree product photography
  has been associated with sales lifts ranging from 5 to 40 percent.
  One cited study suggests a 14 percent increase in sales and a
  17 percent better shopping experience.

  In another example, True Value reportedly saw a 22 percent
  conversion lift after adding 360-degree product photography, while
  Home Depot saw fewer returns during a 360-degree product-photo
  A/B test.

