id: 03-why-it-matters
title: "Why it matters — the conversion math"
order: 3
visual: presenter-slide

# Scene 3 of the new arc: the business case in real numbers.
# All four stats are from publicly reported case studies / industry
# research — no invented figures. Sources logged in the segment notes
# at the bottom. Bullets are paced to the narration with bullet_starts
# so the numbers land on the beats.
slide:
  eyebrow: "WHY IT MATTERS"
  title_html: |
    The numbers
    fashion buyers
    <span class="accent">already moved on</span>.
  bullets:
    - "+134% conversion on the PDP — fashion retailer case study after adding product video to product pages."
    - "+27% lift in conversion — switching a flat product image for a 360° rotation (Practical Ecommerce / DueMaternity)."
    - "+35% add-to-cart — pages with 360° spin vs. static stills (Cappasity / luxury benchmark)."
    - "−12 to −18% returns — fashion retailers who added product demo video, measured over six months."
  bullet_starts: [2.5, 11.0, 19.5, 28.0]

narration: |
  Now the part the buyer cares about — the numbers.

  A fashion retailer added product video to the PDP and saw
  conversion go up a hundred and thirty four percent. Same traffic,
  same catalog, more checkouts.

  Swap a flat hero image for a 360° rotation and the lift sits
  around twenty seven percent — that's the spin alone, before
  anything else changes.

  Add-to-cart climbs another thirty five percent on pages with a
  spin. Shoppers commit faster when they can see every angle.

  And returns go down twelve to eighteen percent across six months.
  Fewer surprises in the box. The math works on both sides of the
  ledger.

