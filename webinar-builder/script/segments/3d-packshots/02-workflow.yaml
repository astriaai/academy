id: 02-workflow
title: "Workflow — upload one photo, get a packshot"
order: 2
visual: screencast-pip

# Real Astria UI walkthrough. The screencast.mp4 is produced by running
#   HEADED=1 npm run record-screencast -- --project 3d-packshots 02-workflow
# which executes scripts/record/3d-packshots/02-workflow.ts inside Playwright.
screencast:
  mode: "video"
  url: "astria.ai/p/backpack"
  record_script: "scripts/record/3d-packshots/02-workflow.ts"

caption:
  eyebrow: "WORKFLOW"
  html: |
    Turn a single image into
    <span class="accent">high-quality 3D photos and videos</span>.

slide:
  bullets:
    - "Open the 3D Packshot template."
    - "Upload a single product image, even a phone shot."
    - "Click Generate and get 3D rotation plus high-quality stills."
  bullet_starts: [4.0, 12.0, 24.0]

narration: |
  Here's the whole flow inside Astria.

  Open the 3D Packshot template. Every pack has a built-in upload, so
  the product image goes in and the packshot comes out.

  Upload a single product image. A clean studio shot is ideal, but
  even a phone shot works. The cleaner the source, the more faithful
  the rotation.

  Click Generate. The queue picks it up, and a few moments later you
  have a full 3D rotation plus a set of high-quality stills, ready
  to drop into a product page, a lookbook, or a Reels grid.

