id: 01-showcase
title: "How simple — one photo in, a campaign out"
order: 1
visual: video-showcase

# Scene 1 of the new arc: sell the simplicity of the workflow.
# Left pane: the single still the studio "uploaded".
# Right pane: the rotating packshot Astria returned.
# Narration leans editorial — atelier vocabulary, no engineering speak.
showcase:
  videos:
    - src: "assets/results/3d-packshots/ref-1d2wianx9ma5dmdee4beo609voen.jpg"
      label: "ONE REFERENCE STILL"
    - src: "assets/results/3d-packshots/rotation-backpack-blue.mp4"
      label: "FULL 360° + STILLS"

caption:
  eyebrow: "THE WORKFLOW"
  html: |
    One photo in.
    A <span class="accent">full campaign</span> out.

narration: |
  Here's the whole workflow. You upload one product still. It can be
  a polished studio shot or a phone snap on the cutting table.
  Astria returns a clean 360° rotation plus a sheet of multi-angle
  stills, ready to drop into the product page, the lookbook, the
  Reels grid. No light kit. No turntable. No retoucher on standby.
  One image in. An editorial-grade campaign out.

