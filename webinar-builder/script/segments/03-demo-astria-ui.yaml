narration: |
  Brand identity is the other half of the equation.
  Every brand has a specific aesthetic — the lighting, the models,
  the framing, even the mood.
  If we want AI-generated images to feel on-brand,
  we can't just describe the product to a generic model.
  Here's a template on Astria for a neutral editorial look —
  one recipe, dozens of consistent variations,
  every frame faithful to the brand's DNA.

