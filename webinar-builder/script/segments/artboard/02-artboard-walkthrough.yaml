# Narration paced to the 108s screencast — each paragraph tracks one beat so
# the voice and the screen stay together. See bullet_starts above.
narration: |
  Let's build one. Start in your Astria workspace. This is America
  Basics — a campaign built around three product templates. A shirt.
  A jacket. A pair of pants. Each one a finished, repeatable
  photoshoot.

  Open your References. This is everything the campaign is made of.
  Use the Filters button to sort the library by class. Filter to
  Human, and you meet the cast — a girl, a woman, and a man, each one
  trained as its own face reference.

  Now filter to Garment, and the wardrobe appears — the jackets, the
  shirts, the pants, every piece trained as a reference too. Cast and
  wardrobe, side by side — that library is what every prompt here
  draws from.

  Open a template, and it already holds a worked prompt. The shirt —
  on the girl, full length on a tennis court, garment tokens resolved
  into a real photograph.

  The jacket — on the man, mid-stride through a skate park, carried by
  the same reference tokens.

  And the pants — on the woman, framed close on the waistline, the fit
  shown in fine detail. Three templates, three worked prompts, one
  shared cast and wardrobe.

  Now the artboard. Up in the corner, open the Astria assistant and
  start a fresh chat. Instead of writing a long prompt by hand, you
  reach for a skill — type a slash to see them.

  Type slash artboard. Then simply describe the film you want
  storyboarded, in plain language — all three models together on a
  clean seamless studio backdrop, calm and editorial, the full
  wardrobe on show across sixteen cinematic shots.

  You never list a single reference token yourself. The skill resolves
  the workspace's cast and wardrobe on its own, and lays out the grid
  with one consistent look. Send it — and it builds the artboard you
  saw at the very start.
