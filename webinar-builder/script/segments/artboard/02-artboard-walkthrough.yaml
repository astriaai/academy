# Narration paced to the 108s screencast — each paragraph tracks one beat so
# the voice and the screen stay together. See bullet_starts above.
narration: |
  Let's build one from scratch. Start in an Astria workspace that
  already has a few templates. In this workspace, America Basics has
  a shirt, a jacket, and a pair of pants. Each template is a reusable
  photoshoot setup.

  Before you ask for an artboard, check the reference library. Click
  References, then use Filters. Filter to Human first. These are the
  people the film can use — the girl, the woman, and the man.

  Now filter to Garment. This is the wardrobe: the jackets, shirts,
  pants, and shoes. For a beginner, this is the key idea: the
  assistant will build the artboard from the cast and wardrobe that
  already live in this workspace.

  Open a template and look at a finished prompt. The shirt template
  shows a complete setup: who is wearing it, where the shot happens,
  and what kind of image it should make.

  The jacket template does the same thing for the man. You do not need
  to copy this prompt. Just notice the pattern: person, garment,
  setting, and style.

  The pants template shows the woman and a closer product detail.
  Three templates, one shared workspace. That gives the assistant
  enough context to plan a consistent film.

  Now open Astria Assistant in the corner and start a fresh chat. This
  is where the artboard starts. You are not going to write sixteen
  separate shots by hand.

  Type slash artboard, then describe the film in plain language. Say
  who should appear, what they wear, where they are, the mood, and the
  format. Here we ask for all three models on a clean studio backdrop,
  calm and editorial, in sixteen-by-nine.

  That is the repeatable recipe: cast, wardrobe, location, mood, and
  aspect ratio. The assistant uses the workspace references for you,
  so the grid stays consistent without you hunting for IDs.

  Send it. If the assistant asks for an aspect ratio, choose the one
  you want for the final video. For a horizontal tutorial or campaign
  film, choose sixteen-by-nine.

  Now watch what happens. The assistant expands your short brief into
  a full sixteen-shot plan. You can see the camera sizes change:
  close-ups, wide shots, product details, and group shots. That
  variety is what makes the final video feel edited instead of flat.

  When the artboard is queued, go to Prompts. The newest entry appears
  at the top, just like any other Astria render. Wait for the progress
  bar, then open the result and inspect the grid.

  That is the whole workflow: one plain-language brief becomes one
  sixteen-shot image. If the cast, clothing, or mood looks right, the
  artboard is ready to drive the video pass.

  If it is not quite right, do not start over. Stay in the same chat
  and ask for the change: make it moodier, switch the location, or
  tighten the wardrobe. The assistant keeps the structure and gives
  you a cleaner next version.
