narration: |
  Now turn the artboard into video. Stay on the same prompts page and
  switch from Image to Video.

  Attach the artboard as a reference image. This is important: it is
  not the first frame. It is a visual reference that tells the video
  model what cast, wardrobe, framing, and mood to preserve.

  For the text, reuse the same idea from the image prompt, but remove
  the word artboard. Now you are asking for the film itself: a short
  America Basics fashion video with the same cast, wardrobe, location,
  mood, and sixteen-by-nine format.

  Choose Seedance2 Fast 720p, keep the duration short, and generate.
  The artboard guides the video as a reference, while the prompt tells
  the model how the campaign should move.
