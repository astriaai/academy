# Draft narration — finalize alongside the recording.
narration: |
  You have the artboard. Now switch it to video.

  Open the artboard in the prompt editor, and flip from Image to
  Video mode. The artboard becomes the first frame — so the video
  inherits its cast, its wardrobe, its whole look.

  Pick Seedance 2 fast. Write a short motion prompt — what moves, how
  the camera glides, the cut rhythm. Generate.

  And your sixteen still tiles become a fifteen-second film.
