id: 01-showcase
title: "What the artboard skill makes"
order: 1
visual: video-showcase

# video-showcase renders .jpg/.png sources as stills (build.ts) — so the two
# finished America Basics artboards display side-by-side as static 4x4 grids.
showcase:
  videos:
    - src: "assets/artboard/america-basics/artboard-act1.jpg"
      label: "STUDIO STORYBOARD"
    - src: "assets/artboard/america-basics/artboard-act2.jpg"
      label: "ON-LOCATION STORYBOARD"

caption:
  eyebrow: "THE ARTBOARD"
  html: |
    Sixteen cinematic shots,
    <span class="accent">one image</span>.

narration: |
  This is an artboard: one image that plans a whole short film.
  It is a four-by-four grid — sixteen cinematic frames — so you can
  see the story before you spend time animating it.

  For a fashion campaign, that means one cast, one wardrobe, one
  location, and one look across every frame. First you make the
  artboard. Then you use it as the visual plan for video. These two
  examples both started from the same Astria workspace.

