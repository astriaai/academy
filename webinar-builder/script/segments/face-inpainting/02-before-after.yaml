narration: |
  This is the proof pass from workspace five five three, using the real
  Original debug layer.

  Original is the first Nano Banana image. Final is after Inpaint faces runs a
  second Nano Banana pass over the detected face area. No separate model,
  and no wardrobe or lighting story here. We are checking the face itself.

  Check the same face at one hundred, three hundred, and six hundred percent.
  If the raw layer turns smooth or glassy and the final keeps pores, lashes,
  and pigmentation, that is the cost earning its keep.

