id: 02-workflow
title: "Workflow — write, pick a model, toggle Inpaint, generate, compare"
order: 2
visual: screencast-pip

# Bulk of the video. The screencast.mp4 is produced by running
#   HEADED=1 npm run record-screencast -- --project face-inpainting 02-workflow
# which executes scripts/record/face-inpainting/02-workflow.ts inside Playwright.
#
# Recording flow (~38s) — every beat is the live Astria UI:
#   0–5s     open the real prompt box with Freya + clothing references
#   5–8s     open the cog wheel and enable Inpaint faces
#   8–14s    zoom into the prompt box and enabled setting
#   14–21s   click Generate, then trim the processing wait
#   21–38s   open the finished prompt lightbox and switch Final / Original
screencast:
  mode: "video"
  url: "astria.ai/prompts?ws=6"
  record_script: "scripts/record/face-inpainting/02-workflow.ts"

caption:
  eyebrow: "WORKFLOW"
  html: |
    Write. Pick a model.
    Enable <span class="accent">Inpaint faces</span>.
    Open the lightbox. Compare 1 vs 2.

slide:
  bullets:
    - "Use a real prompt with Freya plus shirt, jeans, and shoes references."
    - "Pick the model — Nano Banana, Gemini, whichever fits the brief."
    - "Open the cog wheel and turn Inpaint faces on."
    - "Generate, then skip the waiting room."
    - "Compare 1 vs 2."
  bullet_starts: [4.0, 10.0, 15.0, 21.0, 30.0]

narration: |
  Here is the whole flow, top to bottom, inside Astria.

  Start with a real prompt. Here we use Freya from the face library,
  plus shirt, jeans, and shoes references, all pinned directly in the
  prompt box.

  Pick the model. Nano Banana, Gemini, whichever you have been
  working with.

  Open the cog wheel, and turn Inpaint faces on.

  Hit generate. The queue picks it up; we will skip the waiting room
  and jump to the finished prompt.

  Now open the image in the lightbox and compare the two layers. One
  is the inpainted final. Two is the raw generation from the base
  model. Same pose, same wardrobe, same light. A noticeably more
  photographic face.

