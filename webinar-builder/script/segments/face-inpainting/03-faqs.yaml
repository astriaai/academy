id: 03-faqs
title: "FAQs"
order: 4
visual: presenter-slide

slide:
  eyebrow: "FAQ"
  title_html: |
    What changes when
    <span class="accent">you enable it?</span>
  bullets:
    - "It runs a second Nano Banana pass over the face area."
    - "Use it when the face will be inspected: fashion, beauty, ecommerce, profile crops."
    - "Budget for extra processing time and roughly double image generation work."
    - "Use 4K, then inspect the face crop before shipping."
  bullet_starts: [2.0, 6.5, 12.0, 17.0]

narration: |
  Rule: Inpaint faces is not a separate identity engine. It is a second
  Nano Banana pass over the detected face area.

  Use it when the face will be inspected: fashion, beauty, ecommerce, profile
  crops. Budget extra processing time and double generation work.

  Use 4K, enable Inpaint faces, then inspect Final against the Original debug
  layer before shipping.

