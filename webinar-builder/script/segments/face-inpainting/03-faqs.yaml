id: 03-faqs
title: "FAQs"
order: 4
visual: presenter-slide

slide:
  eyebrow: "FAQ"
  title_html: |
    What changes when
    <span class="accent">you enable it?</span>
  bullets:
    - "It runs a second Nano Banana pass over the face area."
    - "It should preserve identity from the reference, not smooth everyone into the same face."
    - "Use it when the face will be inspected: fashion, beauty, ecommerce, profile crops."
    - "Budget for extra processing time and roughly double image generation work."
    - "Use 4K, then inspect the face crop before shipping."
  bullet_starts: [2.0, 6.5, 11.5, 16.5, 21.0]

narration: |
  Rule: Inpaint faces is not a separate model. It is a second Nano Banana pass
  over the detected face area.

  It should not smooth everyone into the same face. Because the generation uses
  an identity reference, the face pass should preserve the person while
  improving detail.

  Use it for inspected faces, budget extra time and double generation work, and
  review Final against Original at 4K before shipping.

