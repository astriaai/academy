id: 01-overview
title: "Why Face Inpainting matters"
order: 2
visual: presenter-slide
duration: 24.0

slide:
  eyebrow: "WHY IT MATTERS"
  title_html: |
    Where face inpainting
    <span class="accent">pays off</span>
  columns:
    - heading: "Use it when"
      bullets:
        - "The face carries the model's identity in the final crop."
        - "The image ships large: lookbook, product-detail zoom, campaign crop."
        - "A client, buyer, or retoucher will inspect the face detail."
      bullet_starts: [1.0, 3.8, 6.8]
    - heading: "Remember"
      bullets:
        - "It is a second Nano Banana pass over the detected face area."
        - "It should preserve identity, not create a generic skin-smoothing look."
        - "Budget extra processing time and roughly double generation work."
      bullet_starts: [10.0, 14.0, 18.2]

narration: |
  Now why it matters.

  Use Face Inpainting when identity has to survive the final crop: lookbook
  pages, product detail zoom, campaign crops, or client review.

  It is not a separate model. It is a second Nano Banana pass over the
  detected face area.

  Unlike a generic skin enhancer, it works with the identity reference, so the
  goal is the same person with better pores, pigmentation, lashes, and eye
  detail.

  Budget extra processing time and roughly double generation work.

