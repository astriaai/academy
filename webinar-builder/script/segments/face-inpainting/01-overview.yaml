id: 01-overview
title: "When Face Inpainting pays off"
order: 1
visual: presenter-slide
duration: 24.0

slide:
  eyebrow: "WHY IT MATTERS"
  title_html: |
    Where face inpainting
    <span class="accent">pays off</span>
  columns:
    - heading: "Use it when"
      bullets:
        - "The image ships large: lookbook, PDP zoom, campaign crop."
        - "The face is small in the full-body frame but important later."
        - "A client, buyer, or retoucher will inspect the face detail."
      bullet_starts: [1.0, 3.8, 6.8]
    - heading: "Remember"
      bullets:
        - "It is a second Nano Banana pass over the detected face area."
        - "That means extra processing time and roughly double generation work."
        - "The proof is the face at 100%, 300%, and 600%."
      bullet_starts: [10.0, 14.0, 18.2]

narration: |
  Here is when Face Inpainting matters commercially. Use it when the image will
  be used large: lookbook pages, product-detail zoom, campaign crops, or client
  review where the face becomes a close-up.

  It is not a separate model. It is a second Nano Banana pass over the
  detected face area, so it adds time and generation work.

  The test is practical zoom: one hundred, three hundred, and six hundred
  percent.

