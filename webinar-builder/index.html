<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;500&family=Inter:ital,wght@0,400;0,500;0,600;1,400&display=swap" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0B0B0C;
        font-family: "Inter", system-ui, sans-serif;
        color: #F4F1EC;
      }
      #root::before {
        content: "";
        position: absolute;
        inset: -10%;
        background: radial-gradient(60% 50% at 50% 35%, rgba(224, 106, 78, 0.10) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      /* Two video panes — side-by-side, centered, sized to fit the
         vertical gap between the caption strip and the headline. Sources
         can be any aspect ratio (we usually drop in portrait result
         clips); object-fit: contain preserves the full frame and lets
         the dark background fill the letterbox.
      */
      /* Layout math (canvas 1920x1080):
           caption strip:  y=40..100 (40px top + 60px high)
           video grid:     y=120..920 (800px tall)
           headline:       y=940..1020 (80px high, 60px from bottom)
         Each video box is 600x800 (3:4 to match portrait sources).
         Two boxes + 32px gap = 1232px; centered in 1920 = 344px margin. */
      /* B-roll background — looping result clips, heavily blurred + dimmed,
         z-indexed behind the foreground content. Visual motion without
         competing with the panes. Auto-fills the canvas in a 2x2 grid. */
      .bg-layer {
        position: absolute;
        inset: 0;
        z-index: 0;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        overflow: hidden;
        pointer-events: none;
      }
      .bg-tile {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: blur(14px) brightness(0.32) saturate(1.1);
        transform: scale(1.08);   /* hides blur edges */
      }
      /* Dark vignette sits above the bg-layer to keep foreground readable. */
      .bg-vignette {
        position: absolute;
        inset: 0;
        z-index: 1;
        background:
          radial-gradient(80% 60% at 50% 50%, rgba(11,11,12,0.35) 0%, rgba(11,11,12,0.85) 100%);
        pointer-events: none;
      }
      .showcase-grid {
        position: absolute;
        top: 120px;
        left: 0;
        right: 0;
        height: 800px;
        display: flex;
        gap: 32px;
        justify-content: center;
        align-items: center;
        z-index: 2;
      }
      .showcase-pane {
        position: relative;
        width: 600px;
        height: 800px;
      }
      .showcase-video {
        width: 100%;
        height: 100%;
        border-radius: 16px;
        background: #1E1D1C;
        object-fit: contain;
        display: block;
        box-shadow: 0 32px 80px rgba(0, 0, 0, 0.55), 0 0 0 2px rgba(244, 241, 236, 0.06);
      }
      .showcase-label {
        position: absolute;
        top: -34px;
        left: 0;
        right: 0;
        font-size: 14px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: #A8A39A;
        font-weight: 500;
        text-align: center;
      }
      .showcase-label .accent {
        color: #E06A4E;
      }

      /* Caption strip — top of canvas, centered. */
      #seg-caption {
        position: absolute;
        top: 40px;
        left: 40px;
        right: 40px;
        height: 60px;
        z-index: 3;
        display: flex;
        flex-direction: column;
        gap: 6px;
        align-items: center;
        text-align: center;
      }
      .caption-eyebrow {
        font-size: 16px;
        letter-spacing: 0.32em;
        color: #A8A39A;
        font-weight: 500;
        position: relative;
        padding: 0 28px;
      }
      .caption-eyebrow::before,
      .caption-eyebrow::after {
        content: "";
        position: absolute;
        top: 11px;
        width: 16px;
        height: 1px;
        background: #E06A4E;
      }
      .caption-eyebrow::before { left: 0; }
      .caption-eyebrow::after { right: 0; }

      /* Headline strip — below the videos. */
      #seg-headline {
        position: absolute;
        bottom: 60px;
        left: 40px;
        right: 40px;
        height: 80px;
        z-index: 3;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .headline-text {
        font-family: "Playfair Display", "Cormorant", Georgia, serif;
        font-size: 56px;
        line-height: 1.15;
        font-weight: 400;
        letter-spacing: 0.005em;
        color: #F4F1EC;
        text-align: center;
      }
      .headline-text .accent { color: #D9B97A; font-style: italic; }

      
  /* Draft-mode narration overlay — stacked at top-center so it never
     collides with slide/caption/PIP layout at the bottom of the canvas. */
  #draft-captions {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    width: 1600px;
    max-width: 90%;
    display: flex;
    justify-content: center;
    z-index: 30;
    pointer-events: none;
  }
  #draft-captions .cap {
    position: absolute;
    top: 0;
    padding: 16px 30px;
    background: rgba(11, 11, 12, 0.78);
    backdrop-filter: blur(8px);
    color: #F4F1EC;
    font-family: "Inter", sans-serif;
    font-size: 28px;
    font-weight: 500;
    line-height: 1.22;
    letter-spacing: -0.01em;
    max-width: 1400px;
    text-align: center;
    border-radius: 10px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.5);
    border: 1px solid rgba(224, 106, 78, 0.35);
  }
  #draft-captions .cap::before {
    content: "DRAFT · narration";
    position: absolute;
    top: -10px;
    left: 16px;
    font-size: 11px;
    letter-spacing: 0.3em;
    padding: 2px 8px;
    background: #E06A4E;
    color: #0B0B0C;
    border-radius: 3px;
    font-weight: 700;
  }

    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="12.20" data-width="1920" data-height="1080">
      <audio id="seg-narration" class="clip" data-start="0" data-duration="12.20" data-track-index="0" src="assets/audio/video-style-transfer/01-result-showcase.mp3" data-volume="1"></audio>
      <audio id="seg-music" class="clip" data-start="0" data-duration="12.20" data-track-index="9" data-volume="0.12" src="assets/music/luxe-pad.mp3" loop></audio>
      <audio class="clip" data-start="0.20" data-duration="2.00" data-track-index="20" data-volume="0.55" src="assets/sfx/whoosh-soft.mp3"></audio>

      <!-- B-roll background (optional; empty when no background_videos configured) -->
      <div class="bg-layer" aria-hidden="true">
        <video class="bg-tile clip" data-start="0" data-duration="12.20" data-track-index="30" data-volume="0" muted playsinline autoplay loop src="assets/results/video-style-transfer/showcase-left.mp4"></video>
        <video class="bg-tile clip" data-start="0" data-duration="12.20" data-track-index="31" data-volume="0" muted playsinline autoplay loop src="assets/results/video-style-transfer/showcase-right.mp4"></video>
        <video class="bg-tile clip" data-start="0" data-duration="12.20" data-track-index="32" data-volume="0" muted playsinline autoplay loop src="assets/results/video-style-transfer/driving-jc.mp4"></video>
      </div>
      <div class="bg-vignette" aria-hidden="true"></div>

      <!-- Side-by-side result videos. Each loops natively. -->
      <div class="showcase-grid">
        <div class="showcase-pane clip" data-start="0" data-duration="12.20" data-track-index="1">
          
          <video class="showcase-video" id="showcase-media-0" data-volume="0" muted playsinline autoplay loop src="assets/results/video-style-transfer/showcase-left.mp4"></video>
        </div>
        <div class="showcase-pane clip" data-start="0" data-duration="12.20" data-track-index="2">
          
          <video class="showcase-video" id="showcase-media-1" data-volume="0" muted playsinline autoplay loop src="assets/results/video-style-transfer/showcase-right.mp4"></video>
        </div>
      </div>

      <!-- Caption (eyebrow above the videos) -->
      <div id="seg-caption" class="clip" data-start="0" data-duration="12.20" data-track-index="10">
        <div class="caption-eyebrow" id="caption-eyebrow">VIDEO STYLE TRANSFER</div>
      </div>

      <!-- Headline (below the videos) -->
      <div id="seg-headline" class="clip" data-start="0" data-duration="12.20" data-track-index="11">
        <div class="headline-text" id="headline-text">Drive any look from a
<span class="accent">reference clip</span>.
</div>
      </div>

      <div id="draft-captions" class="clip" data-start="0" data-duration="9999" data-track-index="9"><div class="cap" id="cap-0" data-start="0.20" data-duration="3.26">Here is what you can build with Astria's</div><div class="cap" id="cap-1" data-start="3.46" data-duration="1.22">video style transfer.</div><div class="cap" id="cap-2" data-start="4.68" data-duration="3.26">Two finished clips, both driven by the same</div><div class="cap" id="cap-3" data-start="7.94" data-duration="3.26">reference video, each styled with a single prompt.</div></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Both panes rise + fade in together.
      tl.from(".showcase-pane", { opacity: 0, scale: 0.95, duration: 0.8, ease: "power3.out", stagger: 0.12 }, 0.2);
      tl.from(".showcase-label", { opacity: 0, y: -8, duration: 0.5, ease: "power2.out", stagger: 0.12 }, 0.6);
      // Caption eyebrow stagger
      tl.from("#caption-eyebrow", { opacity: 0, x: -20, duration: 0.5, ease: "power2.out" }, 0.6);
      // Headline reveal
      tl.from("#headline-text", { opacity: 0, y: 20, duration: 0.7, ease: "expo.out" }, 0.8);

      tl.from("#cap-0", { opacity: 0, y: 18, duration: 0.35, ease: "power2.out" }, 0.20);tl.to("#cap-0", { opacity: 0, duration: 0.3, ease: "power1.in" }, 3.26);
      tl.from("#cap-1", { opacity: 0, y: 18, duration: 0.35, ease: "power2.out" }, 3.46);tl.to("#cap-1", { opacity: 0, duration: 0.3, ease: "power1.in" }, 4.48);
      tl.from("#cap-2", { opacity: 0, y: 18, duration: 0.35, ease: "power2.out" }, 4.68);tl.to("#cap-2", { opacity: 0, duration: 0.3, ease: "power1.in" }, 7.74);
      tl.from("#cap-3", { opacity: 0, y: 18, duration: 0.35, ease: "power2.out" }, 7.94);tl.to("#cap-3", { opacity: 0, duration: 0.3, ease: "power1.in" }, 11.00);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
