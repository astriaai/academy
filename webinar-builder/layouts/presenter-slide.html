<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0B0B0C;
        font-family: "Inter", system-ui, sans-serif;
        color: #F4F1EC;
      }
      #root::before {
        content: "";
        position: absolute;
        inset: -10%;
        background: radial-gradient(60% 50% at 75% 45%, rgba(224, 106, 78, 0.10) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }
      #seg-avatar {
        position: absolute;
        top: 80px;
        right: 80px;
        width: 620px;
        height: 920px;
        border-radius: 24px;
        background: #1E1D1C;
        overflow: hidden;
        box-shadow: 0 32px 80px rgba(0,0,0,0.5);
        z-index: 2;
      }
      #seg-avatar video { width: 100%; height: 100%; object-fit: cover; display: block; }
      .avatar-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px; background: radial-gradient(circle at 50% 40%, #2a2927 0%, #121211 70%); }
      .avatar-ring { width: 280px; height: 280px; border-radius: 50%; border: 2px solid #A8A39A; position: relative; }
      .avatar-ring::after { content: ""; position: absolute; inset: 16px; border-radius: 50%; background: radial-gradient(circle at 50% 45%, #3a3938 0%, #1b1a19 80%); }
      .avatar-label { font-family: "Inter", sans-serif; font-size: 22px; letter-spacing: 0.18em; text-align: center; color: #A8A39A; font-weight: 600; }
      .avatar-label span { display: block; margin-top: 12px; font-size: 28px; letter-spacing: -0.01em; color: #F4F1EC; font-weight: 400; }

      #seg-slide {
        position: absolute;
        top: 80px;
        left: 80px;
        width: 1140px;
        height: 920px;
        z-index: 2;
      }
      .slide-frame { width: 100%; height: 100%; padding: 96px 100px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; background: #1E1D1C; border-radius: 24px; }
      .slide-eyebrow { font-size: 20px; letter-spacing: 0.32em; color: #A8A39A; font-weight: 500; }
      .slide-title { font-family: "Inter", sans-serif; font-size: 112px; line-height: 1.02; letter-spacing: -0.025em; font-weight: 600; margin: 0; max-width: 880px; }
      .slide-title .accent { color: #E06A4E; }
      .slide-bullets { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 18px; }
      .slide-bullets li { font-size: 32px; line-height: 1.35; color: #F4F1EC; font-weight: 400; padding-left: 44px; position: relative; }
      .slide-bullets li::before { content: ""; position: absolute; left: 0; top: 20px; width: 24px; height: 1px; background: #A8A39A; }
      .slide-footer { display: flex; align-items: center; gap: 16px; font-size: 20px; letter-spacing: 0.2em; color: #A8A39A; font-weight: 500; }
      .slide-dot { width: 4px; height: 4px; background: #A8A39A; border-radius: 50%; }
      {{CAPTIONS_CSS}}
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="{{DURATION}}" data-width="1920" data-height="1080">
      <audio id="seg-narration" class="clip" data-start="0" data-duration="{{DURATION}}" data-track-index="0" src="{{AUDIO_SRC}}" data-volume="1"></audio>

      <div id="seg-avatar" class="clip" data-start="0" data-duration="{{DURATION}}" data-track-index="1">
        {{AVATAR_MEDIA}}
      </div>

      <div id="seg-slide" class="clip" data-start="0" data-duration="{{DURATION}}" data-track-index="2">
        <div class="slide-frame">
          <div class="slide-eyebrow" id="slide-eyebrow">{{SLIDE_EYEBROW}}</div>
          <h1 class="slide-title" id="slide-title">{{SLIDE_TITLE_HTML}}</h1>
          <ul class="slide-bullets" id="slide-bullets">
            {{SLIDE_BULLETS_HTML}}
          </ul>
          <div class="slide-footer" id="slide-footer">
            <span>astria.ai</span><span class="slide-dot"></span><span>Scaling Fashion Lookbooks</span>
          </div>
        </div>
      </div>
      {{CAPTIONS_HTML}}
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.from("#slide-eyebrow", { opacity: 0, y: 20, duration: 0.5, ease: "power2.out" }, 0.3);
      tl.from("#slide-title",   { opacity: 0, y: 30, duration: 0.7, ease: "expo.out"   }, 0.45);
      tl.from("#slide-bullets li", { opacity: 0, x: -30, duration: 0.55, ease: "power2.out", stagger: 0.12 }, 0.85);
      tl.from("#slide-footer",  { opacity: 0, duration: 0.4, ease: "power1.out" }, 1.55);
      tl.from("#seg-avatar",    { opacity: 0, x: 40, duration: 0.8, ease: "power3.out" }, 0.5);
      {{CAPTIONS_GSAP}}
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
