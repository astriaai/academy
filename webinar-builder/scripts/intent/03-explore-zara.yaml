narration: |
  Brand identity is the other half of the equation. Take Zara — they have a
  very specific aesthetic: fashion-forward, European, a little editorial,
  shot against clean cyclorama or urban backdrops. If we want AI-generated
  images to feel like Zara, we can't just say "yellow dress" to a generic
  model. Here's a lookbook for a single Zara product, generated through
  Astria. The model, the lighting, the framing — all consistent with the
  brand's DNA. One product, dozens of variations.

