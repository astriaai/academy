id: 04-lookbook-references
title: "Editing references inside the Lookbook"

source:
  webinar_file: "../astria-webinar.mp4"
  timestamp: "01:09:30-01:10:30"
  gemini_report: ".cache/gemini/04-lookbook-references.json"
  note: |
    Per Gemini analysis of the original clip (see gemini_report), the demo
    is: Alon starts on astria.ai/prompts with a reference already uploaded
    (a pose image he labelled "45 angle view"), clicks it to reveal the
    Lookbook cube grid, swaps the Face reference for one called "Elara"
    from a list, then clicks the thumbnail again to open a context menu
    with Crop / Remove Background / Edit with Nano Banana 2 (4K, 2K, 1K) /
    Delete, and hovers Remove Background.
    Note: context menu opens on LEFT-CLICK of the thumbnail, not right-click.

url: "https://www.astria.ai/prompts"
requires_auth: true

viewport: "1600x900"
device_scale_factor: 2
duration_s: 30

# Assumes the session already has at least one reference uploaded to the
# composer (`.ref-thumb`). If the session is fresh, the script falls back
# to showing the empty cube grid.
preconditions:
  needs_uploaded_reference: true

narration: |
  Let me open the Lookbook view on a prompt I've been building.
  Every reference I've uploaded sits in one of these slots — pose, face,
  jacket, top, bottom, footwear, background. The powerful part is that I
  don't have to leave the flow to edit any of them. Clicking a reference
  thumbnail opens a context menu — crop it, remove the background, or edit
  the image in place with Nano Banana, right here.

beats:
  - id: open-lookbook
    at: "0-5s"
    say: "Let me open the Lookbook view on a prompt I've been building."
    show: "click the existing reference thumbnail; the Lookbook cube grid appears with the eight category slots."
    action:
      type: click
      target: ".ref-thumb, .lookbook-toggle"
      wait_after_ms: 1500

  - id: scan-grid
    at: "5-12s"
    say: "Every reference sits in one of these slots — pose, face, jacket, top, bottom, footwear, background."
    show: "cursor glides across a few cubes in sequence."
    action:
      type: cursor-tour
      targets:
        - ".cube-cell[data-lookbook-names-param='pose']"
        - ".cube-cell[data-lookbook-names-param='face']"
        - ".cube-cell[data-lookbook-names-param='jacket']"
        - ".cube-cell[data-lookbook-names-param='bottom']"
      per_ms: 900

  - id: open-context
    at: "12-18s"
    say: "Clicking a reference thumbnail opens a context menu."
    show: "click the reference thumbnail; a menu appears with Crop, Remove Background, Edit with Nano Banana, Delete."
    action:
      type: click
      target: ".ref-thumb:first-of-type"
      wait_after_ms: 2000

  - id: hover-remove
    at: "18-24s"
    say: "Remove the background in place with one click."
    show: "hover 'Remove Background' — option highlights."
    action:
      type: hover
      target: "text=/Remove\\s+Background/i"
      hold_ms: 2500

  - id: settle
    at: "24-30s"
    say: "Crop it, or edit the image in place with Nano Banana — right here."
    show: "cursor glides down the menu items: Crop → Edit with Nano Banana."
    action:
      type: cursor-tour
      targets:
        - "text=/^Crop$/i"
        - "text=/Edit with Nano Banana/i"
      per_ms: 1800
